name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-24.04, windows-2025, macos-15 ]

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.26.x'
          cache: true

      - name: Run tests
        run: go test ./...

  build:
    name: Build snapshot
    runs-on: ubuntu-24.04
    needs: test
    steps:
    - name: Check out code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      with:
        fetch-depth: 0  # Needed to get the version from git describe

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
      with:
        go-version: 1.26.x
        cache: true

    - name: Run vet
      run: go vet ./...

    - name: Install Syft
      uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0

    - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7
      with:
        version: "~> v2"
        args: release --snapshot --clean

    - name: Upload artifacts javm-linux-arm64
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: javm-linux-arm64
        path: dist/javm-linux-arm64.tar.gz

    - name: Upload artifact javm-linux-x86_64
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: javm-linux-x86_64
        path: dist/javm-linux-x86_64.tar.gz

    - name: Upload artifact javm-darwin-arm64
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: javm-darwin-arm64
        path: dist/javm-darwin-arm64.tar.gz

    - name: Upload artifact javm-darwin-x86_64
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: javm-darwin-x86_64
        path: dist/javm-darwin-x86_64.tar.gz

    - name: Upload artifact javm-windows-x86_64
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: javm-windows-x86_64
        path: dist/javm-windows-x86_64.zip

    - name: Upload artifact javm-windows-arm64
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: javm-windows-arm64
        path: dist/javm-windows-arm64.zip

  sonar:
    name: SonarQube analysis
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.26.x'
          cache: true

      - run: go test -coverprofile=coverage.out -covermode=atomic ./...

      - uses: sonarsource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
